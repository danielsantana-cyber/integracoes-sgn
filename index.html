<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Operacional — Suporte SGN</title>
  <meta name="description" content="Central Operacional do Suporte SGN" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --brand: #0b57d0;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg-soft: #f8fafc;
      --sidebar-bg: #082c6c;
      --sidebar-bg-2: #07275f;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-bg-2) 100%);
    }

    .app-name {
      padding-top: 10px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: .2px;
    }

    .app-name-link,
    .app-name-link:hover {
      color: #ffffff !important;
      text-decoration: none;
    }

    .app-name::after {
      content: "SUPORTE SGN · v1.2";
      display: block;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      color: rgba(255,255,255,.72);
    }

    .search {
      margin: 64px 16px 16px 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,.18);
      position: relative;
    }

    .search input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.1);
      color: #ffffff;
      padding: 10px 36px 10px 12px;
    }

    .search input::placeholder {
      color: rgba(255,255,255,.72);
    }

    .search .clear-button {
      color: #ffffff !important;
    }

    .search .results-panel {
      margin-top: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      overflow: hidden;
    }

    .search .results-panel .matching-post {
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 10px 12px;
    }

    .search .results-panel .matching-post:last-child {
      border-bottom: none;
    }

    .search .results-panel .matching-post a {
      color: #ffffff !important;
      font-weight: 600;
      text-decoration: none;
      display: block;
      margin-bottom: 4px;
    }

    .search .results-panel .matching-post p {
      margin: 0;
      color: rgba(255,255,255,.78) !important;
      font-size: 13px;
      line-height: 1.45;
    }

    .search .results-panel em {
      color: #93c5fd !important;
      font-style: normal;
      font-weight: 700;
      background: rgba(147,197,253,.12);
      padding: 1px 4px;
      border-radius: 4px;
    }

    .sidebar ul li a,
    .sidebar-nav a {
      color: #ffffff !important;
    }

    .sidebar-nav a:hover {
      background: rgba(255,255,255,.1);
      border-radius: 6px;
    }

    .sidebar-nav li.active > a {
      background: rgba(255,255,255,.14);
      border-radius: 6px;
      font-weight: 700;
    }

    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > strong,
    .sidebar-nav > ul > li > em,
    .sidebar-nav > ul > li > span,
    .sidebar-nav li p,
    .sidebar-nav li strong {
      color: #ffffff !important;
      font-weight: 700 !important;
      opacity: 1 !important;
      margin: 0;
      padding: 6px 0;
      display: block;
    }

    .sidebar-nav ul {
      margin: 0;
      padding-left: 0;
    }

    .sidebar-nav li {
      margin: 0;
    }

    .sidebar-toggle {
      top: 12px !important;
      left: 12px !important;
      bottom: auto !important;
      background: rgba(255,255,255,.92) !important;
      border-radius: 8px !important;
      width: 42px;
      height: 42px;
      display: flex !important;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
      z-index: 9999 !important;
    }

    .sidebar-toggle span {
      background-color: var(--brand) !important;
    }

    .content {
      padding-top: 12px;
    }

    .markdown-section {
      max-width: 920px;
      padding: 36px 42px 60px;
    }

    .markdown-section h1 {
      text-align: left;
      font-size: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 18px;
      color: #183b63;
    }

    .markdown-section h2 {
      border-left: 4px solid var(--brand);
      padding-left: 10px;
      margin-top: 28px;
      color: #24476d;
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--brand);
      background: #f4f8ff;
      padding: 10px 14px;
      border-radius: 8px;
      color: #243b53;
    }

    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
    }

    .markdown-section th,
    .markdown-section td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }

    .markdown-section th {
      background: var(--bg-soft);
    }

    .markdown-section code:not([class*=lang-]) {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .footer-note { display: none !important; }

    @media (max-width: 768px) {
      .search { margin-top: 64px; }
      .markdown-section { padding: 24px 18px 40px; }
    }
  </style>
</head>
<body>
  <div id="app">Carregando a Central Operacional...</div>
  <script>
    window.$docsify = {
      name: 'Central de Conhecimento',
      homepage: 'home.md',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      search: {
        placeholder: 'Buscar erro, sistema ou sintoma',
        noData: 'Nenhum resultado encontrado',
        depth: 3
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>

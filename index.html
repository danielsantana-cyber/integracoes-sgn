<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Conhecimento — Suporte SGN</title>
  <meta name="description" content="Base de conhecimento operacional — Squad Integracoes, Movimentacoes Financeiras">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand-dark:     #082c6c;
      --brand-navy:     #072d6b;
      --brand-blue:     #0b57d0;
      --brand-accent:   #0b57d0;
      --brand-subtle:   #f8fafc;
      --brand-border:   #e5e7eb;
      --brand-text:     #1f2937;
      --brand-muted:    #6b7280;
      --brand-success:  #166534;
      --brand-danger:   #991B1B;

      --theme-color:           var(--brand-blue);
      --base-font-family:      'Inter', -apple-system, sans-serif;
      --base-font-size:        15px;
      --base-line-height:      1.8;
      --base-color:            var(--brand-text);
      --base-background-color: #FFFFFF;

      --sidebar-background:    var(--brand-dark);
      --sidebar-width:         272px;

      --heading-color:         var(--brand-text);
      --link-color:            var(--brand-blue);
      --code-font-family:      'JetBrains Mono', monospace;
      --code-inline-color:     #1e3a8a;
      --code-inline-background-color: #f4f8ff;
      --code-theme-background: #072d6b;
    }

    * { box-sizing: border-box; }

    /* ── Sidebar ─────────────────────────────── */
    .sidebar {
      background: linear-gradient(180deg, #082c6c 0%, #07275f 100%) !important;
      border-right: 1px solid var(--brand-border) !important;
    }

    .sidebar::before {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, #0b57d0 0%, #3b82f6 100%);
    }

    .sidebar .app-name {
      padding: 24px 20px 0;
      display: block;
    }

    .sidebar .app-name-link {
      color: #FFFFFF !important;
      font-size: 13.5px !important;
      font-weight: 600 !important;
      text-decoration: none !important;
      letter-spacing: 0.01em;
      line-height: 1.4;
      display: block;
    }

    .sidebar .app-name-link::after {
      content: 'Suporte SGN  ·  v1.2';
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 4px;
    }

    /* Search */
    .search {
      padding: 12px 14px 4px !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      margin-bottom: 8px !important;
    }

    .search input {
      background: rgba(255,255,255,0.1) !important;
      border: 1px solid rgba(255,255,255,0.18) !important;
      border-radius: 10px !important;
      color: #FFF !important;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 7px 12px 7px 32px !important;
      width: 100% !important;
      transition: all 0.15s;
    }

    .search input:focus {
      background: rgba(255,255,255,0.14) !important;
      border-color: rgba(255,255,255,0.35) !important;
      outline: none;
    }

    .search input::placeholder { color: rgba(255,255,255,0.25) !important; }

    .search .results-panel {
      background: var(--brand-navy) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      border-radius: 6px !important;
    }

    .search .matching-post { border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
    .search .matching-post a { color: rgba(255,255,255,0.85) !important; font-size: 13px; }
    .search .matching-post p { color: rgba(255,255,255,0.4) !important; font-size: 12px; }

    /* Nav items */
    .sidebar ul {
      padding: 0 10px !important;
    }

    .sidebar ul li a,
    .sidebar-nav a {
      color: rgba(255,255,255,0.80) !important;
      font-size: 13px !important;
      font-weight: 400 !important;
      padding: 5px 10px !important;
      border-radius: 5px;
      display: block;
      transition: all 0.12s;
      text-decoration: none !important;
    }

    .sidebar ul li a:hover,
    .sidebar-nav a:hover {
      color: #ffffff !important;
      background: rgba(255,255,255,0.08) !important;
      border-radius: 6px;
    }

    .sidebar ul li.active > a,
    .sidebar-nav li.active > a {
      color: #FFFFFF !important;
      background: rgba(255,255,255,0.14) !important;
      border-radius: 6px;
      font-weight: 600 !important;
    }

    /* Section labels — corrigido de verdade */
    .sidebar ul p,
    .sidebar ul p strong,
    .sidebar ul li p,
    .sidebar ul li p strong,
    .sidebar ul li strong,
    .sidebar-nav ul p,
    .sidebar-nav ul p strong,
    .sidebar-nav li p,
    .sidebar-nav li p strong,
    .sidebar-nav li strong {
      color: #ffffff !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      padding: 20px 10px 5px !important;
      margin: 0 !important;
      opacity: 1 !important;
      display: block !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
    }

    /* ── Main content ─────────────────────────── */
    .content {
      padding: 48px 60px !important;
      max-width: 840px;
    }

    /* ── Headings ─────────────────────────────── */
    h1 {
      font-size: 1.65rem !important;
      font-weight: 700 !important;
      color: var(--brand-text) !important;
      letter-spacing: -0.025em;
      border-bottom: 1px solid var(--brand-border) !important;
      padding-bottom: 18px !important;
      margin-bottom: 6px !important;
    }

    h2 {
      font-size: 1.05rem !important;
      font-weight: 600 !important;
      color: var(--brand-text) !important;
      margin-top: 48px !important;
      padding: 11px 16px !important;
      background: var(--brand-subtle);
      border-left: 4px solid #0b57d0;
      border-radius: 0 6px 6px 0;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 0.82rem !important;
      font-weight: 600 !important;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--brand-muted) !important;
      margin-top: 32px !important;
      margin-bottom: 8px !important;
    }

    /* ── Paragraphs ──────────────────────────── */
    p {
      color: #2D3748;
      line-height: 1.8;
    }

    /* ── Blockquote ──────────────────────────── */
    blockquote {
      background: #f4f8ff !important;
      border-left: 4px solid #0b57d0 !important;
      border-radius: 0 6px 6px 0;
      padding: 12px 18px !important;
      margin: 0 0 20px 0 !important;
      color: #243b53 !important;
      font-size: 14px;
    }

    blockquote p { margin: 0 !important; color: #243b53 !important; }

    /* ── Code ─────────────────────────────────── */
    pre {
      background: #072d6b !important;
      border-radius: 8px !important;
      padding: 18px 22px !important;
      margin: 12px 0 !important;
    }

    pre code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 13px !important;
      color: #93c5fd !important;
      line-height: 1.65;
    }

    code {
      font-family: 'JetBrains Mono', monospace !important;
      background: #f4f8ff !important;
      color: #1e3a8a !important;
      padding: 2px 6px !important;
      border-radius: 3px !important;
      font-size: 13px !important;
    }

    /* ── Tables ──────────────────────────────── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0 !important;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--brand-border);
      font-size: 14px;
    }

    thead tr { background: #082c6c !important; }

    thead th {
      color: #FFFFFF !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.07em !important;
      padding: 11px 16px !important;
    }

    tbody tr:nth-child(odd)  { background: #f8fafc; }
    tbody tr:nth-child(even) { background: #FFFFFF; }
    tbody tr:hover           { background: #eef2ff !important; transition: background 0.1s; }

    tbody td {
      padding: 9px 16px !important;
      font-size: 13.5px !important;
      border-bottom: 1px solid var(--brand-border) !important;
      color: var(--brand-text);
    }

    /* ── HR ──────────────────────────────────── */
    hr {
      border: none !important;
      border-top: 1px solid var(--brand-border) !important;
      margin: 32px 0 !important;
    }

    /* ── Lists ────────────────────────────────── */
    .markdown-section ol li,
    .markdown-section ul li {
      padding: 3px 0;
      font-size: 14.5px;
      color: var(--brand-text);
      line-height: 1.75;
    }

    /* ── Progress bar ────────────────────────── */
    #nprogress .bar {
      background: #0b57d0 !important;
      height: 2px !important;
    }

    /* ── Footer ──────────────────────────────── */
    .ck-footer {
      margin-top: 64px;
      padding-top: 20px;
      border-top: 1px solid var(--brand-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: var(--brand-muted);
    }

    /* ── Status badges ───────────────────────── */
    .badge-open {
      background: #FEF2F2;
      color: #991B1B;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 500;
    }

    .badge-done {
      background: #F0FDF4;
      color: #166534;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 500;
    }

    /* ── Sidebar toggle ──────────────────────── */
    .sidebar-toggle {
      background: #0b57d0 !important;
      border-radius: 0 5px 5px 0 !important;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      .content { padding: 28px 22px !important; }
      h2 { padding: 10px 14px !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;background:linear-gradient(180deg,#082c6c 0%,#07275f 100%);gap:14px;">
      <div style="color:#FFFFFF;font-size:15px;font-weight:600;letter-spacing:-0.01em;">Central de Conhecimento</div>
      <div style="color:rgba(255,255,255,0.3);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;">Suporte SGN</div>
      <div style="margin-top:8px;width:32px;height:32px;border:2px solid rgba(255,255,255,0.15);border-top-color:#93c5fd;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    window.$docsify = {
      name: 'Central de Conhecimento',
      nameLink: 'home.md',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 1,
      auto2top: true,
      homepage: 'home.md',
      notFoundPage: true,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Buscar erros, causas, chamados...',
        noData: 'Nenhum resultado encontrado.',
        depth: 4,
      },

      plugins: [
        function(hook) {
          hook.doneEach(function() {

            // Forçar cor branca nos labels de seção da sidebar
            document.querySelectorAll('.sidebar ul p, .sidebar ul li p, .sidebar ul li strong, .sidebar ul p strong').forEach(function(el) {
              el.style.cssText = 'color:#FFFFFF !important; font-size:10px !important; font-weight:700 !important; letter-spacing:0.1em !important; text-transform:uppercase !important; font-family:Inter,-apple-system,sans-serif !important; padding:20px 10px 5px !important; margin:0 !important; display:block !important; opacity:1 !important;';
            });

            // Footer
            var section = document.querySelector('.markdown-section');
            if (section && !section.querySelector('.ck-footer')) {
              var footer = document.createElement('div');
              footer.className = 'ck-footer';
              footer.innerHTML = '<span>Central de Conhecimento · Suporte SGN</span><span>Squad Integracoes · Movimentacoes Financeiras</span>';
              section.appendChild(footer);
            }

            // Status badges in tables
            document.querySelectorAll('tbody td').forEach(function(td) {
              var text = td.textContent.trim();
              if (text === 'Em aberto') {
                td.innerHTML = '<span class="badge-open">Em aberto</span>';
              } else if (text === 'Concluido' || text === 'Concluído') {
                td.innerHTML = '<span class="badge-done">Concluido</span>';
              }
            });
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>

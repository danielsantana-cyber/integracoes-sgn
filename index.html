<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Conhecimento — Suporte SGN</title>
  <meta name="description" content="Base de conhecimento estruturada para o Squad Integrações — Movimentações Financeiras">

  <!-- Docsify Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      /* ── Brand ──────────────────────────────── */
      --brand-primary:    #0052CC;
      --brand-accent:     #0065FF;
      --brand-dark:       #091E42;
      --brand-mid:        #253858;
      --brand-subtle:     #F4F5F7;
      --brand-border:     #DFE1E6;
      --brand-success:    #006644;
      --brand-warning:    #FF8B00;
      --brand-danger:     #BF2600;
      --brand-info:       #0747A6;

      /* ── Docsify Overrides ──────────────────── */
      --theme-color:           var(--brand-primary);
      --base-font-family:      'IBM Plex Sans', sans-serif;
      --base-font-size:        15px;
      --base-line-height:      1.75;
      --base-color:            var(--brand-dark);
      --base-background-color: #FFFFFF;

      --sidebar-background:    var(--brand-dark);
      --sidebar-width:         290px;
      --sidebar-color:         rgba(255,255,255,0.75);
      --sidebar-nav-link-color:rgba(255,255,255,0.75);
      --sidebar-nav-link-color--active: #FFFFFF;
      --sidebar-nav-link-background-color--active: rgba(255,255,255,0.1);
      --sidebar-nav-link-font-weight--active: 600;

      --navbar-background:     #FFFFFF;
      --navbar-root-color:     var(--brand-primary);

      --heading-color:         var(--brand-dark);
      --heading-h1-font-size:  2rem;
      --heading-h2-font-size:  1.4rem;
      --heading-h3-font-size:  1.1rem;

      --link-color:            var(--brand-accent);

      --code-font-family:      'IBM Plex Mono', monospace;
      --code-inline-color:     var(--brand-primary);
      --code-inline-background-color: #E9F0FF;
      --code-theme-background: var(--brand-dark);
      --code-theme-text:       #CDD5E0;

      --blockquote-border-color: var(--brand-primary);
      --blockquote-color:       var(--brand-mid);

      --table-head-background:  var(--brand-dark);
      --table-head-color:       #FFFFFF;
      --table-row-odd-background: var(--brand-subtle);
      --table-cell-border-color: var(--brand-border);

      --coverpage-background-color: var(--brand-dark);
    }

    /* ── Global reset ─────────────────────────── */
    * { box-sizing: border-box; }

    body {
      font-family: var(--base-font-family);
    }

    /* ── Sidebar ──────────────────────────────── */
    .sidebar {
      background: var(--brand-dark) !important;
      border-right: 1px solid rgba(255,255,255,0.06) !important;
    }

    .sidebar-brand {
      padding: 24px 20px 12px !important;
      display: block;
    }

    .sidebar-brand span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .sidebar .app-name-link {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #FFFFFF !important;
      line-height: 1.3;
      letter-spacing: -0.01em;
      padding: 0 20px 20px;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }

    .sidebar ul {
      padding: 0 12px !important;
    }

    .sidebar li {
      padding: 0 !important;
    }

    .sidebar ul li a {
      color: rgba(255,255,255,0.65) !important;
      font-size: 13.5px;
      font-weight: 400;
      padding: 6px 10px !important;
      border-radius: 6px;
      display: block;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .sidebar ul li a:hover {
      color: #FFFFFF !important;
      background: rgba(255,255,255,0.08) !important;
    }

    .sidebar ul li.active > a {
      color: #FFFFFF !important;
      background: rgba(0, 101, 255, 0.25) !important;
      font-weight: 600;
    }

    .sidebar ul p {
      color: rgba(255,255,255,0.3) !important;
      font-size: 10px !important;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 18px 10px 4px !important;
      margin: 0;
    }

    /* Sidebar search */
    .search input {
      background: rgba(255,255,255,0.07) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 8px !important;
      color: #FFF !important;
      font-family: var(--base-font-family);
      font-size: 13px;
      padding: 8px 14px 8px 36px !important;
      margin: 0 12px 8px !important;
      width: calc(100% - 24px) !important;
      transition: all 0.2s;
    }

    .search input:focus {
      background: rgba(255,255,255,0.12) !important;
      border-color: var(--brand-accent) !important;
      outline: none;
    }

    .search input::placeholder { color: rgba(255,255,255,0.3) !important; }

    .search .results-panel {
      background: var(--brand-mid) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 8px !important;
      margin: 0 12px !important;
    }

    .search .matching-post { border-bottom: 1px solid rgba(255,255,255,0.08) !important; }
    .search .matching-post a { color: rgba(255,255,255,0.9) !important; }
    .search .matching-post p { color: rgba(255,255,255,0.5) !important; }

    /* ── Main content ─────────────────────────── */
    .content {
      padding: 40px 52px !important;
      max-width: 900px;
    }

    /* Top nav bar */
    .app-nav {
      background: #FFFFFF !important;
      border-bottom: 1px solid var(--brand-border) !important;
      padding: 0 52px !important;
    }

    /* ── Headings ─────────────────────────────── */
    h1 {
      font-size: 1.9rem !important;
      font-weight: 700;
      color: var(--brand-dark) !important;
      letter-spacing: -0.025em;
      border-bottom: 2px solid var(--brand-primary) !important;
      padding-bottom: 16px !important;
      margin-bottom: 8px !important;
    }

    h2 {
      font-size: 1.2rem !important;
      font-weight: 700;
      color: var(--brand-dark) !important;
      margin-top: 52px !important;
      padding: 14px 18px !important;
      background: var(--brand-subtle);
      border-left: 4px solid var(--brand-primary);
      border-radius: 0 8px 8px 0;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 0.85rem !important;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--brand-mid) !important;
      margin-top: 28px !important;
      margin-bottom: 6px !important;
    }

    /* ── Paragraph blocks (bold labels) ──────── */
    p strong:first-child {
      display: block;
    }

    /* ── Blockquote ──────────────────────────── */
    blockquote {
      background: #EFF4FF;
      border-left: 4px solid var(--brand-primary) !important;
      border-radius: 0 8px 8px 0;
      padding: 14px 20px !important;
      margin: 0 0 24px 0 !important;
      color: var(--brand-mid) !important;
      font-size: 14px;
    }

    blockquote p { margin: 0 !important; }

    /* ── Code blocks ─────────────────────────── */
    pre {
      background: var(--brand-dark) !important;
      border-radius: 10px !important;
      padding: 20px 24px !important;
      margin: 16px 0 !important;
      position: relative;
      overflow: hidden;
    }

    pre::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent));
    }

    pre code {
      font-family: 'IBM Plex Mono', monospace !important;
      font-size: 13px !important;
      color: #A8C4FF !important;
      line-height: 1.6;
    }

    code {
      font-family: 'IBM Plex Mono', monospace !important;
      background: #E9F0FF !important;
      color: var(--brand-primary) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      font-size: 13px !important;
    }

    /* ── Tables ──────────────────────────────── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0 !important;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(9,30,66,0.12);
    }

    thead tr {
      background: var(--brand-dark) !important;
    }

    thead th {
      color: #FFFFFF !important;
      font-size: 11.5px !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
      padding: 12px 16px !important;
    }

    tbody tr:nth-child(odd) {
      background: var(--brand-subtle);
    }

    tbody tr:nth-child(even) {
      background: #FFFFFF;
    }

    tbody tr:hover {
      background: #E9F0FF !important;
    }

    tbody td {
      padding: 10px 16px !important;
      font-size: 13.5px !important;
      border-bottom: 1px solid var(--brand-border) !important;
      color: var(--brand-dark);
    }

    /* ── Horizontal rule ─────────────────────── */
    hr {
      border: none !important;
      border-top: 1px solid var(--brand-border) !important;
      margin: 36px 0 !important;
    }

    /* ── FAQ Item card effect ─────────────────── */
    .markdown-section h2 + p,
    .markdown-section h2 + blockquote {
      margin-top: 16px;
    }

    /* Bold section labels */
    .markdown-section strong {
      color: var(--brand-dark);
    }

    /* ── Lists ────────────────────────────────── */
    .markdown-section ol li,
    .markdown-section ul li {
      padding: 3px 0;
      font-size: 14.5px;
      color: var(--brand-dark);
    }

    /* ── Progress bar ────────────────────────── */
    #nprogress .bar {
      background: var(--brand-accent) !important;
      height: 3px !important;
    }

    /* ── Home page hero ──────────────────────── */
    .home-hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-mid) 100%);
      border-radius: 12px;
      padding: 40px 48px;
      margin-bottom: 40px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .home-hero::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: rgba(0, 101, 255, 0.15);
      border-radius: 50%;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      .content { padding: 24px 20px !important; }
      .app-nav { padding: 0 20px !important; }
      h2 { padding: 10px 14px !important; }
    }

    /* ── Sidebar toggle (mobile) ─────────────── */
    .sidebar-toggle {
      background: var(--brand-primary) !important;
      border-radius: 0 6px 6px 0 !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:'IBM Plex Sans',sans-serif;color:#091E42;gap:12px;">
      <div style="width:40px;height:40px;border:3px solid #0052CC;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <span style="font-size:14px;color:#6B778C;letter-spacing:0.02em;">Carregando base de conhecimento...</span>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    window.$docsify = {
      name: '📚 Central de Conhecimento',
      nameLink: '/',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'docs/home.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍  Buscar erros, causas, soluções...',
        noData: 'Nenhum resultado encontrado.',
        depth: 4,
        hideOtherSidebarContent: false,
      },

      plugins: [
        function(hook) {
          hook.beforeEach(function(html) { return html; });
          hook.doneEach(function() {
            // Highlight status badges in tables
            document.querySelectorAll('td').forEach(function(td) {
              var text = td.textContent.trim();
              if (text === 'Em aberto') {
                td.innerHTML = '<span style="background:#FFEBE6;color:#BF2600;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">' + text + '</span>';
              } else if (text === 'Concluído') {
                td.innerHTML = '<span style="background:#E3FCEF;color:#006644;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">' + text + '</span>';
              }
            });

            // Add section labels styling
            document.querySelectorAll('.markdown-section strong').forEach(function(el) {
              var text = el.textContent;
              if (text.startsWith('📌') || text.startsWith('🧠') || text.startsWith('✅') || text.startsWith('⚠️') || text.startsWith('👨')) {
                el.style.cssText = 'font-size:13px;letter-spacing:0.04em;color:#42526E;text-transform:uppercase;margin-bottom:6px;display:block;';
              }
            });
          });
        }
      ]
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-xml-doc.min.js"></script>
</body>
</html>
